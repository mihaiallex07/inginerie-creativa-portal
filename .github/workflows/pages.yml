name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Supabase config
        run: |
          cat > js/config.js << 'CONFIGEOF'
          // Portal IC — Configurare Supabase
          // Generat automat de GitHub Actions
          const APP_CONFIG = {
            supabase: {
              url: '${{ vars.SUPABASE_URL || "" }}',
              anonKey: '${{ vars.SUPABASE_ANON_KEY || "" }}',
            },
            demoMode: '${{ vars.SUPABASE_URL }}' === '' || '${{ vars.SUPABASE_URL }}' === 'undefined',
            appName: 'Portal Inginerie Creativă',
            version: '2.0.0',
          };
          CONFIGEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
